name: QuickCaptureLite
options:
  bundleIdPrefix: com.2ndarystorage
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  MetaWearablesDAT:
    url: https://github.com/facebook/meta-wearables-dat-ios
    exactVersion: 0.4.0

targets:
  QuickCaptureLite:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: QuickCaptureLite
    info:
      path: QuickCaptureLite/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.2ndarystorage.QuickCaptureLite
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: MetaWearablesDAT
        product: MWDATCore
      - package: MetaWearablesDAT
        product: MWDATCamera
